name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            src/requirements.txt
            tests/requirements-test.txt

      - name: Install application dependencies
        run: pip install -r src/requirements.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Dependency security audit
        run: |
          pip install pip-audit
          pip-audit -r src/requirements.txt --desc on

      - name: Run test suite
        env:
          SOURCE_BUCKET: daisy-source-test
          PROCESSED_BUCKET: daisy-processed-test
          AWS_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
          # Dummy credentials prevent botocore NoCredentialsError.
          # No real AWS calls are made — boto3.client is patched in conftest.py.
          AWS_ACCESS_KEY_ID: test-key-id
          AWS_SECRET_ACCESS_KEY: test-secret-key
        run: PYTHONPATH=src python3 -m pytest tests/ --tb=short -q
